# Render Blueprint для Character Chat Bot.
services:
  - type: web
    name: character-chat-bot
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m src.main
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ALLOWED_USER_IDS
        sync: false
      - key: DATABASE_URL
        sync: false           # Neon Postgres connection string (postgresql://...)
      - key: OPENROUTER_MODEL
        value: cognitivecomputations/dolphin-mistral-24b-venice-edition:free
      - key: OPENROUTER_FALLBACKS
        value: nousresearch/hermes-3-llama-3.1-405b:free,qwen/qwen3-next-80b-a3b-instruct:free,meta-llama/llama-3.3-70b-instruct:free
      - key: HISTORY_SIZE
        value: "20"
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: "1"
